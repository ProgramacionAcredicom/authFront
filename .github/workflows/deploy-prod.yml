name: Deploy (Production) to Hostinger

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production-environment
    timeout-minutes: 15
    steps:
      - name: Deploy a Hostinger
        uses: appleboy/ssh-action@v1.0.3
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.PA_SSH_HOST }}
          username: ${{ secrets.PA_SSH_USERNAME }}
          password: ${{ secrets.PA_SSH_PASSWORD }}
          port: ${{ secrets.PA_SSH_PORT || 22 }}
          timeout: 600s
          envs: BRANCH_NAME
          script: |
            set -e
            set -o pipefail
            
            echo "🚀 Iniciando despliegue en Hostinger..."

            # Cargar el perfil del shell para tener acceso al PATH completo
            if [ -f ~/.bashrc ]; then
              source ~/.bashrc
            fi
            if [ -f ~/.bash_profile ]; then
              source ~/.bash_profile
            fi
            if [ -f ~/.profile ]; then
              source ~/.profile
            fi
            if [ -f ~/.zshrc ]; then
              source ~/.zshrc
            fi

            # Asegurar que el PATH incluye ubicaciones comunes de pnpm
            export PATH="$HOME/.local/share/pnpm:$PATH"
            export PATH="$HOME/.npm-global/bin:$PATH"
            export PATH="$(npm config get prefix 2>/dev/null)/bin:$PATH" || true

            cd ${{ vars.PA_WORKING_DIRECTORY }}
            echo "📁 Directorio de trabajo: $(pwd)"

            # Verificar que pnpm está instalado
            echo "🔍 Buscando pnpm..."
            echo "PATH actual: $PATH"
            
            # Intentar encontrar pnpm en varias ubicaciones
            PNPM_CMD=""
            if command -v pnpm &> /dev/null; then
              PNPM_CMD="pnpm"
            elif [ -f ~/.local/share/pnpm/pnpm ]; then
              PNPM_CMD="~/.local/share/pnpm/pnpm"
            elif [ -f "$(npm config get prefix 2>/dev/null)/bin/pnpm" ]; then
              PNPM_CMD="$(npm config get prefix)/bin/pnpm"
            elif [ -f /usr/local/bin/pnpm ]; then
              PNPM_CMD="/usr/local/bin/pnpm"
            fi

            if [ -z "$PNPM_CMD" ]; then
              echo "❌ Error: pnpm no está instalado o no se encuentra en el PATH"
              echo "💡 Intenta ejecutar: npm install -g pnpm"
              exit 1
            fi

            echo "✅ pnpm encontrado: $PNPM_CMD"
            $PNPM_CMD -v

            # Obtener el nombre de la rama desde la variable de entorno
            BRANCH_NAME="${BRANCH_NAME:-production}"
            echo "🌿 Rama: $BRANCH_NAME"

            # Asegurar que tenemos la referencia remota actualizada
            git fetch origin

            # Descargar cambios sin commit
            git reset --hard origin/$BRANCH_NAME
            git clean -fd

            # Descargar la última versión de la aplicación
            git pull origin $BRANCH_NAME
            echo "✅ Aplicación actualizada"

            # Instalar dependencias
            $PNPM_CMD install
            echo "✅ Dependencias instaladas"

            # Build la aplicación
            $PNPM_CMD build
            echo "✅ Aplicación compilada"

            # Limpiar la carpeta de despliegue
            rm -rf ${{ vars.PA_DEPLOY_DIRECTORY }}/*
            echo "✅ Carpeta de despliegue limpiada"

            # Crear la carpeta de despliegue
            mkdir -p ${{ vars.PA_DEPLOY_DIRECTORY }}
            echo "✅ Carpeta de despliegue creada"

            # Mover los archivos de la aplicación a la carpeta de Hostinger
            mv dist/* ${{ vars.PA_DEPLOY_DIRECTORY }}
            echo "✅ Archivos de la aplicación copiados"